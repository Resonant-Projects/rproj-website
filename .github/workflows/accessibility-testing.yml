name: Accessibility Testing

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  DEV_PORT: 4321

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_RR_RESOURCES_ID: ${{ secrets.NOTION_RR_RESOURCES_ID }}

  accessibility-tests:
    name: Accessibility Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Install Chrome
        run: npx --yes browser-driver-manager@latest install chrome

      - name: Start dev server
        id: dev
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_RR_RESOURCES_ID: ${{ secrets.NOTION_RR_RESOURCES_ID }}
        run: |
          bun run dev --port ${{ env.DEV_PORT }} --host &
          echo "PID=$!" >> "$GITHUB_OUTPUT"
          for i in {1..30}; do
            sleep 2
            if curl -sf http://localhost:${{ env.DEV_PORT }} > /dev/null; then
              echo "Dev server is up"; break; fi
            echo "Waiting for dev server... ($i/30)"
            if [ $i -eq 30 ]; then echo "Server did not start in time" >&2; exit 1; fi
          done

      - name: Run Axe-Core scan
        run: bun run axe:scan

      - name: Run accessibility tests
        run: bun run test:accessibility:ci

      - name: Run custom accessibility tests
        run: bun run test:accessibility:verbose

      - name: Run Lighthouse accessibility
        run: |
          mkdir -p accessibility-reports
          bun run lighthouse:accessibility

      - name: Upload reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: accessibility-reports
          path: |
            accessibility-reports/
            lighthouse-report.html
          retention-days: 30

      - name: Stop dev server
        if: always()
        run: kill ${{ steps.dev.outputs.PID }} || true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            let body = '## Accessibility Test Results\n\n';
            try {
              const files = fs.readdirSync('accessibility-reports');
              const summary = files.find(f => f.includes('summary'));
              if (summary) {
                body += '```\n' + fs.readFileSync(path.join('accessibility-reports', summary), 'utf8') + '\n```\n';
              }
              body += '\nFull reports are available in the workflow artifacts.';
            } catch (err) {
              body += 'Unable to read accessibility report.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
